baseURL: "https://felipecidade.github.io/"
languageCode: "pt-br"
title: "Felipe Cidade"
theme: "hugo-profile"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

Paginate: 6
enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: blog
      name: Blog
      title: Blog
      url: /blogs
      weight: 1
    - identifier: projects
      name: Projetos
      title: Projetos
      url: /#projects
      weight: 2

params:
  title: "Felipe Cidade"
  description: "Tech Manager | Cloud Solutions & Software Architecture | dti digital"
  favicon: "/images/favicon.svg"
  useBootstrapCDN: false
  animate: true

  theme:
    defaultTheme: "dark"

  color:
    primaryColor: "#667eea"
    darkmode:
      primaryColor: "#667eea"
      backgroundColor: "#1a1a2e"
      secondaryBackgroundColor: "#16213e"
      textColor: "#e0e0e0"
      secondaryTextColor: "#a0a0b0"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.6
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Felipe Cidade"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: true
      disableProjects: false
      disableAchievements: false
      disableContact: false

  hero:
    enable: true
    intro: "Olá, sou"
    title: "Felipe Cidade."
    subtitle: "Tech Manager | Cloud Solutions & Software Architecture"
    content: >
      Lidero times de engenharia na dti digital com responsabilidade sobre entrega, pessoas
      e resultado financeiro da unidade. Vinte anos construindo software e arquiteturas cloud.
      Hoje o trabalho é fazer times fazerem isso bem.
    image: /images/hero.svg
    bottomImage:
      enable: true
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/felipecidade
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/felipecidade
      customIcons:
        - icon: /images/icons/email.svg
          url: "mailto:felipe.cidade@outlook.com"

  about:
    enable: true
    title: "Sobre Mim"
    image: "/images/me.jpg"
    content: |-
      Sou **Tech Manager** na [dti digital](https://www.dtidigital.com.br/), responsável por times de
      engenharia com accountability sobre entrega, pessoas e saúde financeira da unidade. O trabalho
      envolve desde decisões de arquitetura e cloud até gestão de carreira, P&L e relacionamento com clientes.

      Antes de virar manager, passei anos como Cloud Architect no Cloud Center of Excellence da dti,
      construindo padrões de migração e arquiteturas de referência em Azure com Terraform. É esse
      background técnico que ancora as decisões de gestão.

      Neste blog escrevo sobre o que aprendo na prática: cloud, arquitetura e o que é ser Tech Manager de verdade.
    skills:
      enable: true
      title: "Tecnologias & Plataformas:"
      items:
        - "Microsoft Azure"
        - "Terraform / IaC"
        - "Azure DevOps"
        - "Kubernetes"
        - "Microserviços"
        - "CI/CD Pipelines"
        - "FinOps"
        - "Gestão de Times"

  experience:
    enable: true
    items:
      - job: "Tech Manager"
        company: "dti digital"
        companyUrl: "https://www.dtidigital.com.br/"
        date: "Set 2025 - Presente"
        featuredLink:
          enable: false
        content: >
          Liderança de times de engenharia na intersecção entre estratégia técnica, gestão de pessoas
          e eficiência de negócio. Responsável pelo P&L da unidade, monitorando KPIs como Billability,
          Margem de Contribuição e Custo Médio. Gestão de carreira, mentoria técnica e planos de
          sucessão. Atuação como Trusted Advisor junto a clientes, com governança sobre decisões
          arquiteturais de Cloud, DevOps e Modernização.

      - job: "Cloud Architect"
        company: "dti digital"
        companyUrl: "https://www.dtidigital.com.br/"
        date: "Nov 2022 - Dez 2025"
        featuredLink:
          enable: false
        content: >
          Atuação no Cloud Center of Excellence (CCoE) de um cliente internacional, responsável por
          padrões de migração on-premise para cloud e arquitetura de referência. Desenvolvimento de
          soluções de Infrastructure as Code com Terraform e ARM Templates no Azure. Liderança de
          time de alta performance, implementação de pipelines CI/CD e condução de knowledge-sharing
          sessions sobre melhores práticas Azure.

      - job: "Software Development Manager"
        company: "GVdasa Inteligência Educacional"
        companyUrl: "https://www.gvdasa.com.br/"
        date: "Mai 2021 - Set 2022"
        featuredLink:
          enable: false
        content: >
          Gestão de times de desenvolvimento com Kanban e SCRUM. Criação de métricas de controle de
          produção, definição de OKRs alinhados à estratégia da empresa. Planejamento de melhorias
          para entrega contínua e descontinuação gradual de sistemas monolíticos legados.

      - job: "PLM Solution Architect"
        company: "Produttar Software"
        companyUrl: "#"
        date: "Abr 2019 - Mar 2020"
        featuredLink:
          enable: false
        content: >
          Análise de requisitos para implantação, mapeamento de fluxos de valor do cliente no ciclo
          de vida de produto. Criação de ROADMAP com payback para jornada de transformação digital.
          Definição de escopo e requisitos para integrações entre sistemas PLM, ERP e MES.

      - job: "Solutions Architect"
        company: "Newgraph"
        companyUrl: "#"
        date: "Set 2015 - Jun 2017"
        featuredLink:
          enable: false
        content: >
          Levantamento de requisitos, mapeamento de workflows e definição de escopo para implantação
          de soluções SIEMENS. Gestão do time de desenvolvimento e suporte técnico. Introdução de
          metodologias ágeis no gerenciamento de projetos de software.

      - job: "Development Team Lead"
        company: "Linq Sistemas"
        companyUrl: "#"
        date: "Mar 2005 - Set 2015"
        featuredLink:
          enable: false
        content: >
          10+ anos coordenando times de desenvolvimento web e desktop com metodologias ágeis.
          Liderança no desenvolvimento de novos produtos e implementações in loco com treinamento.
          Principais clientes: GM, Braskem, Souza Cruz, Stihl, Universal Leaf Tabacos.

  education:
    enable: false
    index: false
    items: []

  achievements:
    enable: true
    title: "Certificações"
    items:
      - title: Microsoft Certified – Azure Fundamentals
        content: Microsoft · Mar 2023
        url: "https://www.credly.com/badges"
      - title: Fundamentals of Cloud FinOps
        content: Board Infinity · Mar 2025
        url: "https://www.credential.net"

  projects:
    enable: true
    title: "Projetos em Destaque"
    items:
      - title: Cloud Center of Excellence (CCoE)
        content: >
          Liderança técnica do CCoE de um cliente internacional na dti digital.
          Definição de padrões de migração on-premise→Azure, arquiteturas de referência
          e biblioteca de módulos Terraform reutilizáveis adotados por +10 squads.
        image: /images/projects/ccoe.svg
        featured:
          name: Leia o post
          link: /blogs/ccoe-cloud-center-of-excellence
        badges:
          - "Azure"
          - "Terraform"
          - "IaC"
          - "Azure DevOps"
        links:
          - icon: fab fa-linkedin
            url: https://www.linkedin.com/in/felipecidade

      - title: FinOps na Prática
        content: >
          Implementação de governança de custos cloud em ambiente enterprise — políticas de
          shutdown, rightsizing e tagging — reduzindo desperdício e gerando economia significativa
          em fatura mensal de nuvem.
        image: /images/projects/finops.svg
        featured:
          name: Podcast Entre Chaves
          link: https://lnkd.in/dRPRZTa7
        badges:
          - "FinOps"
          - "Azure"
          - "Governança"
          - "Custo Cloud"
        links:
          - icon: fab fa-linkedin
            url: https://www.linkedin.com/in/felipecidade

  contact:
    enable: true
    title: "Contato"
    content: >
      Quer conversar sobre arquitetura cloud, oportunidades ou uma dúvida técnica específica?
      Me manda uma mensagem.
    btnName: "Enviar e-mail"
    btnLink: "mailto:felipe.cidade@outlook.com"

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Posts Recentes
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/felipecidade
      linkedin: https://www.linkedin.com/in/felipecidade

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min de leitura"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  terms:
    read: "Ler"
    toc: "Índice"
    copyright: "Todos os direitos reservados"
    pageNotFound: "Página não encontrada"
    emailText: "Confira este site"

  datesFormat:
    article: "2 Jan, 2006"
    articleList: "2 Jan, 2006"
    articleRecent: "2 Jan, 2006"
